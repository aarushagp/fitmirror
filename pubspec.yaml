name: fitmirror
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase (latest versions compatible with Dart 3.9 / Flutter 3.27+)
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  google_sign_in: ^6.1.0

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # State management
  provider: ^6.1.2

  # UI fonts & styling
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
